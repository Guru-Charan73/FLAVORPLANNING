# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: flavournamespace.flavourmodule
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://vhetids4ci.sap.esperion.com:44300/
          client: '100'
        app:
          name: Z_ESP_FLVPLAN
          description: FIORI APPLICATION FOR FLAVOR PLANNING
          package: Z_ESPERION_MM
          transport: DS4K900689
        exclude:
          - /test/
